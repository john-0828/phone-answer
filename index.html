<html lang="zh-CN">

<style>

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #f0a500;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .header-text p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .welcome {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 4px;
  }
  .welcome-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .welcome p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }
  .examples {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .example-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .example-chip:hover, .example-chip:active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,165,0,0.08);
  }

  /* Messages */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 82%;
    padding: 12px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
  }
  .msg.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-weight: 500;
    border-top-right-radius: 4px;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }
  .dots {
    display: flex; gap: 5px; align-items: center;
  }
  .dots span {
    width: 7px; height: 7px;
    background: var(--text3);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--accent); }
  }

  /* Input bar */
  .input-bar {
    padding: 12px 16px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
  }
  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 22px;

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: #000; }

  .error-bubble {
    background: rgba(255,80,80,0.1);

    color: #ff8080;
    font-size: 13px;
    padding: 10px 14px;

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

[注意事项，有则写，无则省略]

如信息不完整主动追问成色或容量。`;

const chatArea = document.getElementById("chatArea");
const inputBox = document.getElementById("inputBox");
const sendBtn = document.getElementById("sendBtn");
let isLoading = false;
const history = [];

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendExample(btn) {
  inputBox.value = btn.textContent;
  autoResize(inputBox);
  sendMessage();
}

function scrollBottom() {
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50);
}

function addMsg(role, text, isError) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");

  const avatar = document.createElement("div");
  avatar.className = "avatar " + (role === "user" ? "user-av" : "bot");
  avatar.textContent = role === "user" ? "我" : "💰";

  const bubble = document.createElement("div");
  bubble.className = isError ? "bubble error-bubble" : "bubble";
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  scrollBottom();
  return bubble;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typing";
  div.innerHTML = `<div class="avatar bot">💰</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text || isLoading) return;

  inputBox.value = "";
  inputBox.style.height = "auto";
  isLoading = true;
  sendBtn.disabled = true;

  addMsg("user", text);
  history.push({ role: "user", content: text });
  showTyping();

  try {
    const resp = await fetch("https://ark.cn-beijing.volces.com/api/v3/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: SYSTEM },
          ...history
        ],
        max_tokens: 600
      })
    });

    const data = await resp.json();
    removeTyping();

    if (data.choices && data.choices[0]) {
      const reply = data.choices[0].message.content;
      history.push({ role: "assistant", content: reply });
      addMsg("bot", reply);
    } else {
      addMsg("bot", "请求失败，请稍后重试。", true);
      history.pop();
    }
  } catch(e) {
    removeTyping();
    addMsg("bot", "网络错误，请检查网络后重试。", true);
    history.pop();
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputBox.focus();
}
</script>
